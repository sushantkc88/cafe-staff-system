<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>QR Codes</title>
<style>
  :root{
    --bg:#f3eee7; --card:#fffaf3; --accent:#b07a3b;
    --border:#d3c3aa; --text:#111;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    background:var(--bg);color:var(--text)
  }
  .container{
    max-width:980px;margin:28px auto;background:var(--card);
    padding:20px;border-radius:12px;border:1px solid var(--border);
    box-shadow:0 8px 20px rgba(0,0,0,.06)
  }
  h1{margin:0 0 12px}
  label{display:block;margin-top:8px;font-size:13px}
  input{
    width:100%;padding:8px;margin-top:6px;border-radius:10px;
    border:1px solid var(--border);font-size:13px;background:#fff;color:var(--text)
  }
  button{
    padding:8px 14px;margin-top:10px;border:none;border-radius:999px;
    font-size:13px;cursor:pointer;background:var(--accent);color:#fff;
    font-weight:600;box-shadow:0 3px 8px rgba(0,0,0,.12)
  }
  .note{font-size:12px;color:#555}
  .grid{
    display:flex;flex-wrap:wrap;gap:16px;margin-top:16px
  }
  .card{
    background:#f7f1e6;border-radius:10px;padding:10px;text-align:center;
    width:200px;box-shadow:0 3px 8px rgba(0,0,0,.08);border:1px solid var(--border)
  }
  img{max-width:180px}
</style>
</head>
<body>
<div class="container">
  <h1>QR Codes for Clock-In</h1>
  <p class="note">Staff scan their QR → they are clocked in using their device time. Admin PIN required to generate.</p>

  <!-- LOGIN -->
  <div id="loginBox">
    <label>Admin PIN</label>
    <input id="adminPINQR" type="password">
    <button onclick="loginQR()">Login</button>
    <p id="msgQR" class="note"></p>
  </div>

  <!-- CONTENT -->
  <div id="qrContent" class="hidden">
    <label>Base URL of Staff Portal (index.html)</label>
    <input id="baseURL" placeholder="https://yourname.github.io/repo/index.html">

    <button onclick="generateQRs()">Generate QR Codes</button>

    <div id="qrGrid" class="grid"></div>
  </div>
</div>

<script>
function load(k,d){ try{ return JSON.parse(localStorage.getItem(k)) || d }catch(e){ return d } }

/* ADMIN LOGIN */
function loginQR(){
  const input = document.getElementById("adminPINQR").value.trim();
  const settings = load("settings",{adminPIN:"9999"});
  if(input === settings.adminPIN){
    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("qrContent").classList.remove("hidden");
  } else {
    document.getElementById("msgQR").textContent = "Wrong PIN";
  }
}

/* GENERATE QR CODES */
function generateQRs(){
  const base = document.getElementById("baseURL").value.trim();
  if(!base){ alert("Enter base URL"); return; }

  const staff = load("staff",[]);
  if(staff.length===0){
    alert("No staff found. Add staff in admin.html first.");
    return;
  }

  const grid = document.getElementById("qrGrid");
  grid.innerHTML = "";

  staff.forEach(s=>{
    const url = base + (base.includes("?") ? "&" : "?") + "clockin=" + encodeURIComponent(s.name);
    const imgURL = "https://chart.googleapis.com/chart?cht=qr&chs=200x200&chl=" + encodeURIComponent(url);

    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <h3>${s.name}</h3>
      <img src="${imgURL}" alt="QR for ${s.name}">
      <p class="note" style="word-break:break-all;">${url}</p>
    `;
    grid.appendChild(card);
  });
}
</script>
</body>
</html>
